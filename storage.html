<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radionodus — Терминал</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b0f19;
  color: #22c55e;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  min-height: 100vh;
  padding-bottom: 80px;
  display: flex;
  flex-direction: column;
}
.content {
  flex: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 20px;
  width: 100%;
}
.header {
  font-size: 13px;
  opacity: 0.5;
  letter-spacing: 2px;
  margin-bottom: 24px;
}
.line {
  font-size: 14px;
  line-height: 2;
  opacity: 0.8;
}
.cursor {
  display: inline-block;
  width: 8px;
  height: 1em;
  background: #22c55e;
  margin-left: 4px;
  vertical-align: bottom;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,50%,100% { opacity:1; }
  25%,75% { opacity:0; }
}
.poem {
  margin-top: 32px;
  padding: 20px;
  background: #111827;
  border-radius: 10px;
  border-left: 2px solid #22c55e;
  font-size: 14px;
  line-height: 2;
  opacity: 0.7;
}
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #111827;
  border-top: 1px solid #1f2937;
  display: flex;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  text-decoration: none;
  color: #6b7280;
  font-size: 12px;
  gap: 4px;
}
.nav-item.active { color: #22c55e; }
.nav-icon { font-size: 22px; line-height: 1; }
</style>
</head>
<body>
<div class="content">
  <div class="header">// TERMINAL v1.0</div>
  <div class="line">$ connecting to radionodus...</div>
  <div class="line">$ loading signal...</div>
  <div class="line">$ <span id="typed"></span><span class="cursor"></span></div>

  <div class="poem" id="poem"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span class="nav-icon">🔌</span>
    <span>Подключить</span>
  </a>
  <a href="how.html" class="nav-item">
    <span class="nav-icon">📖</span>
    <span>Инструкция</span>
  </a>
  <a href="terminal.html" class="nav-item active">
    <span class="nav-icon">&gt;_</span>
    <span>Терминал</span>
  </a>
  <a href="storage.html" class="nav-item">
    <span class="nav-icon">📁</span>
    <span>Хранилище</span>
  </a>
</nav>

<script>
const poems = [
  "сигнал идёт сквозь стены\nнас не видно\nмы просто — здесь",
  "свобода не кричит\nона тихо\nоткрывает страницы",
  "провода под землёй\nслова над облаками\nникто не знает пути",
  "ты входишь в сеть\nсеть не знает тебя\nэто и есть суть"
];

const poem = poems[Math.floor(Math.random() * poems.length)];
document.getElementById("poem").innerHTML = poem.replace(/\n/g, "<br>");

const text = "signal established.";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typed").innerHTML += text.charAt(i++);
    setTimeout(type, 80);
  }
}
setTimeout(type, 1500);
</script>
</body>
</html>
