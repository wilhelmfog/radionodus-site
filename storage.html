<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radionodus — Хранилище</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b0f19;
  color: #e5e7eb;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  min-height: 100vh;
  padding-bottom: 80px;
}
.content {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 20px;
}
.header {
  font-size: 13px;
  color: #22c55e;
  opacity: 0.6;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.path {
  font-size: 12px;
  opacity: 0.3;
  margin-bottom: 24px;
}
.file-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #111827;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
  color: #e5e7eb;
}
.file-item:hover { background: #1f2937; }
.file-icon { font-size: 18px; opacity: 0.7; }
.file-name { font-size: 14px; flex: 1; }
.file-size { font-size: 11px; opacity: 0.35; }

/* Модальное окно для фото */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.modal.open { display: flex; }
.modal img {
  max-width: 100%;
  max-height: 100vh;
  object-fit: contain;
}
.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  color: #22c55e;
  font-size: 24px;
  cursor: pointer;
  background: none;
  border: none;
}
.empty {
  text-align: center;
  padding: 60px 20px;
  opacity: 0.3;
  font-size: 13px;
  line-height: 2;
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #111827;
  border-top: 1px solid #1f2937;
  display: flex;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  text-decoration: none;
  color: #6b7280;
  font-size: 10px;
  gap: 4px;
}
.nav-item.active { color: #22c55e; }
.nav-icon { font-size: 18px; line-height: 1; }
</style>
</head>
<body>

<div class="content">
  <div class="header">📁 ХРАНИЛИЩЕ</div>
  <div class="path">/root/archive/photos</div>

  <div class="file-list" id="fileList">
    <div class="empty">
      // директория пуста<br>
      // файлы появятся позже
    </div>
  </div>
</div>

<!-- Модальное окно -->
<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modalImg" src="" alt="">
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span class="nav-icon">🔌</span>
    <span>Подключить</span>
  </a>
  <a href="how.html" class="nav-item">
    <span class="nav-icon">📖</span>
    <span>Инструкция</span>
  </a>
  <a href="terminal.html" class="nav-item">
    <span class="nav-icon">&gt;_</span>
    <span>Терминал</span>
  </a>
  <a href="storage.html" class="nav-item active">
    <span class="nav-icon">📁</span>
    <span>Хранилище</span>
  </a>
</nav>

<script>
// Список файлов — добавляй сюда когда будут фото
// Формат: { name: "01_filename.jpg", size: "2.4 MB" }
const files = [
  // { name: "01_egg.jpg", size: "1.8 MB" },
  // { name: "02_zaporozets.jpg", size: "2.1 MB" },
];

const list = document.getElementById("fileList");

if (files.length > 0) {
  list.innerHTML = "";
  files.forEach(f => {
    const item = document.createElement("div");
    item.className = "file-item";
    item.onclick = () => openPhoto(f.name);
    item.innerHTML = `
      <span class="file-icon">🖼</span>
      <span class="file-name">${f.name}</span>
      <span class="file-size">${f.size}</span>
    `;
    list.appendChild(item);
  });
}

function openPhoto(name) {
  document.getElementById("modalImg").src = `photos/${name}`;
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}
</script>
</body>
</html>
