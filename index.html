<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radionodus</title>

<style>
body {
  margin: 0;
  background: #0b0f19;
  color: #e5e7eb;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 500px;
  padding: 20px;
}

.terminal {
  background: #111827;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 16px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.note {
  margin-top: 20px;
  opacity: 0.7;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<div class="terminal">
$ radionodus connect
</div>

<button onclick="connectVPN()">CONNECT</button>

<div class="note">
No logs · No tracking · Works everywhere
</div>

</div>

<script>
function connectVPN() {
  const userAgent = navigator.userAgent.toLowerCase();

  const vlessLink = "vless://ТВОЙ_КОНФИГ";

  if (userAgent.includes("android")) {
    window.location.href = vlessLink;
  } else if (userAgent.includes("iphone") || userAgent.includes("ipad")) {
    alert("Откройте ссылку через клиент (Shadowrocket / Streisand)");
    window.location.href = vlessLink;
  } else {
    navigator.clipboard.writeText(vlessLink);
    alert("Ссылка скопирована. Вставьте её в клиент.");
  }
}
</script>

</body>
</html>
