<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radionodus</title>

<style>

.title {
  font-size: 24px;
  margin-bottom: 16px;
  font-weight: normal;
}

.highlight {
  background: #111827;
  border: 1px solid #1f2937;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 13px;
}
  
body {
  margin: 0;
  background: #0b0f19;
  color: #e5e7eb;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 500px;
  padding: 20px;
}

.terminal {
  background: #111827;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 1em;
  background: #22c55e; /* яркий зеленый */
  margin-left: 6px;
  animation: blink 1s infinite;
  vertical-align: bottom;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

button {
  width: 100%;
  padding: 16px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin-bottom: 12px;
}

button + button {
  margin-top: 12px;
}

button.copy {
  background: #374151;
}

button {
  opacity: 1;
  pointer-events: auto;
}
  
.note {
  margin-top: 20px;
  opacity: 0.7;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">Radionodus</h1>

<div class="highlight">
  No logs · No tracking · No data collection
</div>

<div class="terminal">
$ radionodus connect <span class="cursor"></span>
</div>

<button onclick="connectVPN()">CONNECT</button>
<button onclick="copyVPN()" class="copy">COPY CONFIG</button>

<div class="note">
1. Установи клиент (Nekobox / V2Ray)<br>
2. Нажми CONNECT или COPY<br>
3. Вставь и подключись
</div>

</div>

<script>
function connectVPN() {
  const vlessLink = "vless://6b74409c-3f5d-4dd7-9ec1-2e445a7a0f35@89.124.108.232:8443?type=ws&encryption=none&path=%2Fradionodus&host=&security=none#test-user";

  const ua = navigator.userAgent.toLowerCase();

  if (ua.includes("android")) {
    window.location.href = vlessLink;

    setTimeout(() => {
      navigator.clipboard.writeText(vlessLink);
      alert("Если не открылось — ссылка скопирована");
    }, 1500);

  } else if (ua.includes("iphone") || ua.includes("ipad")) {
    alert("Открой через клиент (Shadowrocket / Streisand)");
    window.location.href = vlessLink;

  } else {
    navigator.clipboard.writeText(vlessLink);
    alert("Ссылка скопирована");
  }
}

function copyVPN() {
  const vlessLink = "vless://6b74409c-3f5d-4dd7-9ec1-2e445a7a0f35@89.124.108.232:8443?type=ws&encryption=none&path=%2Fradionodus&host=&security=none#test-user";

  const input = document.createElement("input");
  input.value = vlessLink;
  document.body.appendChild(input);
  input.select();
  document.execCommand("copy");
  document.body.removeChild(input);

  alert("Скопировано");
}
</script>

</body>
</html>
