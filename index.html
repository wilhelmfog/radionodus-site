<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radionodus</title>

<style>
body {
  margin: 0;
  background: #0b0f19;
  color: #e5e7eb;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 420px;
  padding: 20px;
  text-align: center;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.lang {
  font-size: 12px;
  opacity: 0.7;
  cursor: pointer;
}

.title {
  font-size: 24px;
  margin-bottom: 10px;
}

.highlight {
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 16px;
  line-height: 1.5;
}

.terminal {
  background: #111827;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 16px;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 1em;
  background: #22c55e;
  margin-left: 6px;
  vertical-align: bottom;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

button {
  width: 100%;
  padding: 14px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 12px;
}

.install {
  margin: 12px 0;
  font-size: 13px;
  opacity: 0.8;
}

.install a {
  color: #22c55e;
  text-decoration: none;
  margin: 0 6px;
}

.note {
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div></div>
  <div class="lang" onclick="toggleLang()">EN / RU</div>
</div>

<div class="title">Radionodus</div>

<div class="highlight" id="slogan">
Manual connection. Full control. No logs.
</div>

<div class="terminal">
$ <span id="typed"></span><span class="cursor"></span>
</div>

<button onclick="copyVPN()" id="copyBtn">COPY CONFIG</button>

<div class="note" id="steps">
1. Install app<br>
2. Copy config<br>
3. Open app → Import → Paste → Connect
</div>

<div class="install" id="download">
No client? Download →
<a href="https://play.google.com/store/apps/details?id=com.v2raytun.android">Android</a> ·
<a href="ТВОЯ_IOS_ССЫЛКА">iOS</a>
</div>

<div class="note" id="hint">
In app: tap "+" → Import config → Paste
</div>

</div>

<script>

// 👉 вставь свою ссылку
const vlessLink = "vless://6b74409c-3f5d-4dd7-9ec1-2e445a7a0f35@89.124.108.232:8443?type=ws&encryption=none&path=%2Fradionodus&host=&security=none#test-user";

// COPY — главный сценарий
function copyVPN() {
  const input = document.createElement("input");
  input.value = vlessLink;
  document.body.appendChild(input);
  input.select();
  document.execCommand("copy");
  document.body.removeChild(input);

  alert(currentLang === "en"
    ? "Copied. Open app and paste config."
    : "Скопировано. Открой приложение и вставь конфиг.");
}

// печать
const text = "radionodus connect";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typed").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}

window.onload = typeWriter;

// 🌍 язык
let currentLang = "en";

function toggleLang() {
  if (currentLang === "en") {
    currentLang = "ru";

    document.getElementById("slogan").innerHTML =
      "Ручное подключение. Полный контроль. Без логов.";

    document.getElementById("copyBtn").innerHTML = "СКОПИРОВАТЬ КОНФИГ";

    document.getElementById("steps").innerHTML =
      "1. Скопируй свой конфиг кнопкой<br>2. Скачай приложение<br>3. Открой приложение → Импорт ( + ) → Вставить из буфера обмена → Подключить";

    document.getElementById("download").innerHTML =
      'Нет приложения? Скачать → <a href="https://play.google.com/store/apps/details?id=com.v2raytun.android">Android</a> · <a href="ТВОЯ_IOS_ССЫЛКА">iOS</a>';

    document.getElementById("hint").innerHTML =
      'В приложении: нажми "+" → Вставить из буфера обмена';

  } else {
    currentLang = "en";

    document.getElementById("slogan").innerHTML =
      "Manual connection. Full control. No logs.";

    document.getElementById("copyBtn").innerHTML = "COPY CONFIG";

    document.getElementById("steps").innerHTML =
      "1. Copy config<br>2. Install app<br>3. Open app → Import ( + ) → Paste → Connect";

    document.getElementById("download").innerHTML =
      'No client? Download → <a href="https://play.google.com/store/apps/details?id=com.v2raytun.android">Android</a> · <a href="ТВОЯ_IOS_ССЫЛКА">iOS</a>';

    document.getElementById("hint").innerHTML =
      'In app: tap "+" → Import config → Paste';
  }
}

</script>

</body>
</html>
