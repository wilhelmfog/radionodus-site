<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radionodus</title>

<style>
body {
  margin: 0;
  background: #0b0f19;
  color: #e5e7eb;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 420px;
  padding: 20px;
  text-align: center;
}

.title {
  font-size: 24px;
  margin-bottom: 16px;
  font-weight: normal;
}

.highlight {
  margin-bottom: 20px;
  font-size: 14px;
  opacity: 0.85;
  line-height: 1.6;
}

.terminal {
  background: #111827;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 1em;
  background: #22c55e;
  margin-left: 6px;
  vertical-align: bottom;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

button {
  width: 100%;
  padding: 14px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 12px;
}

button.copy {
  background: #374151;
}

.install {
  margin: 18px 0 8px 0; /* 👈 ключевое */
  font-size: 13px;
  opacity: 0.8;
}

.install a {
  color: #22c55e;
  text-decoration: none;
  margin: 0 6px;
}

.note {
  margin-top: 16px;
  font-size: 12px;
  opacity: 0.6;
}

.copy-block {
  margin-top: 8px;
}

.arrow {
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Radionodus</div>

<div class="highlight">
No logs · No tracking · No user data
</div>

<div class="terminal">
$ <span id="typed"></span><span class="cursor"></span>
</div>

<button onclick="connectVPN()">CONNECT</button>

<div class="install">
No client? <span class="arrow">Download →</span>
<a href="https://play.google.com/store/apps/details?id=com.v2raytun.android">Android</a> ·
<a href="ТВОЯ_IOS_ССЫЛКА">iOS</a>
</div>


<div class="copy-block">
  <button onclick="copyVPN()" class="copy">COPY CONFIG</button>
  <div class="note">
    If connection doesn’t open — use COPY
  </div>
</div>

</div>

<script>

// 👉 ВСТАВЬ СВОЮ РЕАЛЬНУЮ ССЫЛКУ
const vlessLink = "vless://6b74409c-3f5d-4dd7-9ec1-2e445a7a0f35@89.124.108.232:8443?type=ws&encryption=none&path=%2Fradionodus&host=&security=none#test-user";

// подключение
function connectVPN() {
  window.location.href = vlessLink;

  setTimeout(() => {
    alert("If nothing happened — use COPY");
  }, 1200);
}

// копирование
function copyVPN() {
  const input = document.createElement("input");
  input.value = vlessLink;
  document.body.appendChild(input);
  input.select();
  document.execCommand("copy");
  document.body.removeChild(input);

  alert("Copied");
}

// печатающийся текст
const text = "radionodus connect";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typed").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}

window.onload = typeWriter;

</script>

</body>
</html>
